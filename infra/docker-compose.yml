services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-worldcup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-worldcup}
      POSTGRES_DB: ${POSTGRES_DB:-worldcup}
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    expose:
      - "6379"

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-worldcup}:${POSTGRES_PASSWORD:-worldcup}@postgres:5432/${POSTGRES_DB:-worldcup}
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      INGEST_ADMIN_TOKEN: ${INGEST_ADMIN_TOKEN:-}
      LIVE_FIXTURE_PROVIDER: ${LIVE_FIXTURE_PROVIDER:-football-data}
      FOOTBALL_DATA_API_TOKEN: ${FOOTBALL_DATA_API_TOKEN:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
